<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Photobox</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <h1>Projet Photobox</h1>
    <button id="galerieBouton">Afficher Galerie</button>

    <nav id="pagination">
        <button id="btn-first">Première</button>
        <button id="btn-prev">Précédente</button>
        <button id="btn-next">Suivante</button>
        <button id="btn-last">Dernière</button>
    </nav>

    <div id="galerie"></div>
    <div id="la_photo"></div>

    <div id="la_categorie"></div>
    
    <div id="les_commentaires"></div>

    <div id="lightbox">
        <button id="lightbox-close">Fermer</button>
        <img id="lightbox-img" src="" alt="">
        <div id="lightbox-controls">
            <button id="lightbox-prev">Précédent</button>
            <button id="lightbox-next">Suivant</button>
        </div>
    </div>
    
    <script type='module' src='dist/index.js'></script>
</body>
</html>
